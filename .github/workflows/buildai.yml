name: Build Mesa and related packages (chroot) shit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest
      options: --privileged   # REQUIRED for devtools

    env:
      CHROOT: /var/lib/archbuild
      REPO: repo

      MESA64: mesa-ps4
      MESA32: lib32-mesa-ps4
      LIBDRM64: libdrm-ps4
      LIBDRM32: lib32-libdrm-ps4
      XF86: xf86-video-amdgpu-ps4

    steps:
      - uses: actions/checkout@v5

      - name: Initialize system
        run: |
          pacman-key --init
          pacman-key --populate archlinux

          sed -i '/#\[multilib\]/,/Include/s/^#//' /etc/pacman.conf

          echo "Server = https://mirror.rackspace.com/archlinux/\$repo/os/\$arch" > /etc/pacman.d/mirrorlist

          pacman -Syu --noconfirm

      - name: Install devtools
        run: |
          pacman -S --noconfirm --needed devtools git base-devel arch-install-scripts

      - name: Create clean chroot
        run: |
          rm -rf ${CHROOT}
          mkdir -p ${CHROOT}/root
          
          # Use pacstrap instead of mkarchroot to avoid nspawn issues
          pacstrap -K ${CHROOT}/root base-devel || exit 1
          echo "pacstrap complete"
          cp /etc/pacman.conf ${CHROOT}/root/etc/pacman.conf
          echo "copied pacman.conf from host"
          
          # Update packages in chroot
          if [ -f ${CHROOT}/root/etc/pacman.conf ]; then
            arch-chroot ${CHROOT}/root pacman -Syu --noconfirm
          else
            echo "ERROR: Chroot creation failed - pacman.conf not found"
            exit 1
          fi

      # ---- BUILD FUNCTION ----
      - name: Build packages in chroot
        run: |
          build_pkg () {
            pkgdir=$1
            cp -r "$pkgdir" /tmp/buildpkg
            cd /tmp/buildpkg
      
            export CHROOT_COPY=/tmp/chroot-copy
            extra-x86_64-build -- --noconfirm --skippgpcheck
      
            mv ./*.pkg.tar.zst "$GITHUB_WORKSPACE/${REPO}/"
      
            cd /
            rm -rf /tmp/buildpkg
          }
      
          mkdir -p "${REPO}"
      
          build_pkg "${LIBDRM64}"
          build_pkg "${LIBDRM32}"
          build_pkg "${XF86}"
          build_pkg "${MESA64}"
          build_pkg "${MESA32}"

      - name: Create repo database
        run: |
          cd ${REPO}
          repo-add ps4-video.db.tar.zst *.pkg.tar.zst

      - name: Commit artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add ${REPO}/*
          git commit -m "Update Mesa + drivers $(date +'%Y-%m-%d')" || echo "No changes"
          git push

name: Build Mesa and related packages

on:
  workflow_dispatch:  # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    env:
      MESA64: mesa-ps4
      MESA32: lib32-mesa-ps4
      LIBDRM64: libdrm-ps4
      LIBDRM32: lib32-libdrm-ps4
      XF86: xf86-video-amdgpu-ps4
      REPO: repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm \
              base-devel git fakeroot meson ninja llvm zlib libdrm python \
              libxxf86vm libxdamage libxshmfence libunwind libglvnd \
              wayland lm_sensors vulkan-icd-loader libxfixes libx11 libxext \
              libxcb xcb-util-keysyms clang libclc spirv-llvm-translator spirv-tools \
              python-docutils cairo cunit

      - name: Create non-root build user and workspace
        run: |
          useradd -m builder
          mkdir -p /home/builder/build
          cp -r . /home/builder/build/
          chown -R builder:builder /home/builder/build

      - name: Build libdrm 64-bit
        run: |
          su builder -c "cd /home/builder/build/${LIBDRM64} && makepkg --skippgpcheck"

      - name: Build libdrm 32-bit
        run: |
          su builder -c "cd /home/builder/build/${LIBDRM32} && makepkg --skippgpcheck"

      - name: Build XF86 driver
        run: |
          su builder -c "cd /home/builder/build/${XF86} && makepkg --skippgpcheck"

      - name: Build Mesa 64-bit
        run: |
          su builder -c "cd /home/builder/build/${MESA64} && makepkg --skippgpcheck"

      - name: Build Mesa 32-bit
        run: |
          su builder -c "cd /home/builder/build/${MESA32} && makepkg --skippgpcheck"


      - name: Copy built packages and update repo
        run: |
          mkdir -p /home/builder/build/${REPO}
          cp /home/builder/build/${LIBDRM64}/*.zst /home/builder/build/${REPO}/
          cp /home/builder/build/${LIBDRM32}/*.zst /home/builder/build/${REPO}/
          cp /home/builder/build/${XF86}/*.zst /home/builder/build/${REPO}/
          cp /home/builder/build/${MESA64}/*.zst /home/builder/build/${REPO}/
          cp /home/builder/build/${MESA32}/*.zst /home/builder/build/${REPO}/
          su builder -c "cd /home/builder/build/${REPO} && repo-add ps4-video.db.tar.zst *.zst"

      - name: Commit artifacts back
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ${REPO}/*.zst ${REPO}/ps4-video.db.tar.zst
          git commit -m "Update built Mesa and drivers $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push

name: Build PS4 Mesa stack (container)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest
      options: --privileged

    env:
      REPO_DIR: repo

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Initialize Arch environment
        shell: bash
        run: |
          set -euxo pipefail

          pacman-key --init
          pacman-key --populate archlinux

          sed -i '/#\[multilib\]/,/Include/s/^#//' /etc/pacman.conf

          cat > /etc/pacman.d/mirrorlist << 'EOF'
          Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch
          EOF

          pacman -Syu --noconfirm

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail

          pacman -S --noconfirm --needed \
            devtools \
            base-devel \
            git \
            sudo \
            fakeroot \
            arch-install-scripts

      - name: Create non-root build user
        shell: bash
        run: |
          set -euxo pipefail

          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build packages
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "$GITHUB_WORKSPACE/$REPO_DIR"

          build_pkg() {
            local pkg="$1"

            echo "=== BUILDING $pkg ==="

            rm -rf /tmp/buildpkg
            cp -r "$GITHUB_WORKSPACE/$pkg" /tmp/buildpkg
            chown -R builder:builder /tmp/buildpkg

            cd /tmp/buildpkg

            sudo -u builder extra-x86_64-build -- --noconfirm --skippgpcheck

            find . -name "*.pkg.tar.zst" -exec mv {} "$GITHUB_WORKSPACE/$REPO_DIR/" \;
          }

          build_pkg libdrm-ps4
          build_pkg lib32-libdrm-ps4
          build_pkg xf86-video-amdgpu-ps4
          build_pkg mesa-ps4
          build_pkg lib32-mesa-ps4

      - name: Create local package repository
        shell: bash
        run: |
          set -euxo pipefail

          cd "$GITHUB_WORKSPACE/$REPO_DIR"
          repo-add ps4-video.db.tar.zst *.pkg.tar.zst

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps4-video-packages
          path: repo/

      - name: Commit packages
        shell: bash
        run: |
          set -euxo pipefail

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add repo/*
          git commit -m "Update packages $(date +'%Y-%m-%d %H:%M')" || true
          git push

          git add repo/*
          git commit -m "Update packages $(date +'%Y-%m-%d %H:%M')" || true
          git push

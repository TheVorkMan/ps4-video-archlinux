name: Build PS4 Mesa stack

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    env:
      REPO_DIR: repo

    steps:
      - uses: actions/checkout@v5

      - name: Initialize Arch
        shell: bash
        run: |
          set -euxo pipefail

          pacman-key --init
          pacman-key --populate archlinux

          sed -i '/#\[multilib\]/,/Include/s/^#//' /etc/pacman.conf

          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' \
            > /etc/pacman.d/mirrorlist

          pacman -Syu --noconfirm

      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail

          pacman -S --noconfirm --needed \
            base-devel \
            git \
            sudo \
            fakeroot

      - name: Create builder user
        shell: bash
        run: |
          set -euxo pipefail

          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build packages
        shell: bash
        run: |
          set -euxo pipefail
      
          mkdir -p "$GITHUB_WORKSPACE/$REPO_DIR"
      
          build_and_install() {
            local pkg="$1"
      
            echo "=== BUILDING $pkg ==="
      
            cd "$GITHUB_WORKSPACE/$pkg"
      
            sudo -u builder bash -c "
              cd '$GITHUB_WORKSPACE/$pkg' &&
              makepkg -sfc --noconfirm --skippgpcheck
            "
      
            PKG_FILE=$(find . -maxdepth 1 -name "*.pkg.tar.zst" | head -n1)
      
            cp "$PKG_FILE" "$GITHUB_WORKSPACE/$REPO_DIR/"

            pacman -Rdd --noconfirm mesa || true
            pacman -Rdd --noconfirm lib32-mesa || true
      
            pacman -U --noconfirm "$PKG_FILE"
          }
      
          # install missing multilib deps first
          cat >> /etc/pacman.conf << 'EOF'

          [multilib]
          Include = /etc/pacman.d/mirrorlist
          EOF
          
          pacman -Sy --noconfirm lib32-gcc-libs lib32-libpciaccess
      
          build_and_install libdrm-ps4
          #build_and_install lib32-libdrm-ps4
          #build_and_install xf86-video-amdgpu-ps4
          #build_and_install mesa-ps4
          #build_and_install lib32-mesa-ps4

      - name: Create repo
        shell: bash
        run: |
          set -euxo pipefail

          cd "$GITHUB_WORKSPACE/$REPO_DIR"
          repo-add ps4-video.db.tar.zst *.pkg.tar.zst

      - name: Commit artifacts
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euxo pipefail

          cd "$GITHUB_WORKSPACE"
      
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      
          git add "$REPO_DIR"/
          git commit -m "Update Mesa + drivers $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push

name: Build Mesa

on:
  workflow_dispatch: # allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    env:
      MESA64: mesa-ps4
      MESA32: lib32-mesa-ps4
      LIBDRM64: libdrm-ps4
      LIBDRM32: lib32-libdrm-ps4
      XF86: xf86-video-amdgpu-ps4
      REPO: repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Arch chroot
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm base-devel git fakeroot
          pacman -S --needed --noconfirm \
            meson ninja llvm zlib libdrm python

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder /github/workspace

      - name: Build Mesa (64-bit)
        working-directory: ${{ env.MESA64 }}
        run: |
          su builder -c "makepkg -s --skippgpcheck"
          
      - name: Build Mesa (32-bit)
        working-directory: ${{ env.MESA32 }}
        run: |
          su builder -c "makepkg -s --skippgpcheck"

      - name: Build libdrm (64-bit)
        working-directory: ${{ env.LIBDRM64 }}
        run: |
          su builder -c "makepkg -s --skippgpcheck"

      - name: Build libdrm (32-bit)
        working-directory: ${{ env.LIBDRM32 }}
        run: |
          su builder -c "makepkg -s --skippgpcheck"

      - name: Build XF86
        working-directory: ${{ env.XF86 }}
        run: |
          su builder -c "makepkg -s --skippgpcheck"


      - name: Copy built files and set up Pacman repo
        working-directory: ${{ env.REPO }}
        run: |
          cp ${{ env.MESA64 }} *.zst . |
          cp ${{ env.MESA32 }} *.zst . |
          cp ${{ env.LIBDRM64 }} *.zst . |
          cp ${{ env.LIBDRM32 }} *.zst . |
          cp ${{ env.XF86 }} *.zst . |
          repo-add ps4-video.db.tar.zst *.zst
          
      - name: Commit artifacts back
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ./built/
          git commit -m "Update built Mesa $(date +'%Y-%m-%d')"
          git push

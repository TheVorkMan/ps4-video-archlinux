name: Build PS4 Mesa stack

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    env:
      REPO_DIR: repo

    steps:
      - uses: actions/checkout@v5

      - name: Initialize Arch
        shell: bash
        run: |
          set -euxo pipefail

          pacman-key --init
          pacman-key --populate archlinux

          sed -i '/#\[multilib\]/,/Include/s/^#//' /etc/pacman.conf

          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' \
            > /etc/pacman.d/mirrorlist

          pacman -Syu --noconfirm

      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail

          pacman -S --noconfirm --needed \
            base-devel \
            git \
            sudo \
            fakeroot

      - name: Create builder user
        shell: bash
        run: |
          set -euxo pipefail

          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build packages
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "$GITHUB_WORKSPACE/$REPO_DIR"

          build_pkg() {
            local pkg="$1"

            echo "=== BUILDING $pkg ==="

            cd "$GITHUB_WORKSPACE/$pkg"

            sudo -u builder bash -c "
              cd '$GITHUB_WORKSPACE/$pkg' &&
              makepkg -sfc --noconfirm --skippgpcheck
            "

            find . -maxdepth 1 -name "*.pkg.tar.zst" \
              -exec mv {} "$GITHUB_WORKSPACE/$REPO_DIR/" \;
          }

          build_pkg libdrm-ps4
          build_pkg lib32-libdrm-ps4
          build_pkg xf86-video-amdgpu-ps4
          build_pkg mesa-ps4
          build_pkg lib32-mesa-ps4

      - name: Create repo
        shell: bash
        run: |
          set -euxo pipefail

          cd "$GITHUB_WORKSPACE/$REPO_DIR"
          repo-add ps4-video.db.tar.zst *.pkg.tar.zst

      - uses: actions/upload-artifact@v4
        with:
          name: ps4-video-packages
          path: repo/
